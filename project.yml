name: SyncClipboard-Swift

options:
  minimumXcodeGenVersion: 2.38.0
  createIntermediateGroups: true
  defaultConfig: Release
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"

packages:
  SignalRClientPackage:
    url: https://github.com/dotnet/signalr-client-swift
    from: 1.0.0

targets:
  SyncClipboardKit:
    type: framework
    platform: macOS
    sources:
      - path: Sources/SyncClipboardKit
    dependencies:
      - package: SignalRClientPackage
        product: SignalRClient
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.jericx.desktop.syncclipboard.swift.kit
        PRODUCT_NAME: SyncClipboardKit
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  SyncClipboard-Swift:
    type: application
    platform: macOS
    sources:
      - path: Sources/SyncClipboardApp
      - path: build/macos/icon.icns
        buildPhase: resources
    dependencies:
      - target: SyncClipboardKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.jericx.desktop.syncclipboard.swift
        PRODUCT_NAME: SyncClipboard-Swift
        INFOPLIST_FILE: build/macos/NativeApp-Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ""

  SyncClipboardTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/SyncClipboardTests
    dependencies:
      - target: SyncClipboardKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.jericx.desktop.syncclipboard.swift.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  SyncClipboard-Swift:
    build:
      targets:
        SyncClipboard-Swift: all
        SyncClipboardTests: [test]
    test:
      targets:
        - SyncClipboardTests
    archive:
      config: Release
